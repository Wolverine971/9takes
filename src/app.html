<!-- src/app.html -->
<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<!-- Preload critical font files (WOFF2 format for better performance) -->
		<link
			rel="preload"
			href="/fonts/NoticiaText-Regular.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="/fonts/NoticiaText-Bold.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>

		<!-- Load font stylesheet (contains @font-face declarations) -->
		<link rel="stylesheet" href="/fonts/stylesheet.css" />

		<!-- Google Fonts: Rajdhani, Space Grotesk, JetBrains Mono -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>

		<!-- Insert any additional critical CSS or <link rel="alternate" ... > as needed -->
		<link rel="alternate" type="application/rss+xml" href="https://9takes.com/rss.xml" />
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
