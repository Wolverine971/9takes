<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="9takes — 9-blade aperture">
  <title>9takes — 9-Blade Aperture</title>
  <desc>Precision optical instrument. Nine iris blades pivot around a sodium-amber opening. Each blade encodes one Enneagram type. Reads as “controlled seeing.”</desc>

  <defs>
    <radialGradient id="ap-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="38%" stop-color="#F59E0B"/>
      <stop offset="80%" stop-color="#B45309" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#241D17" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ap-lens" cx="38%" cy="32%" r="78%">
      <stop offset="0%"  stop-color="#3a302a"/>
      <stop offset="65%" stop-color="#241D17"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </radialGradient>

    <!-- Single visible blade region. Bounded by:
         - outer arc P_0(θ=0°) → P_1(θ=40°) at R=98
         - leading edge from P_1 inward to T_1 at inner ring
         - inner arc T_1(60°) → T_0(20°) at R=28 (counter-clockwise, 40°)
         - leading edge from T_0 back to P_0 -->
    <g id="ap-blade">
      <path
        d="M 128,30 A 98,98 0 0,1 191.0,52.9 L 152.2,114.0 A 28,28 0 0,0 137.6,101.7 Z"
        fill="#3a302a"
        stroke="#5C4F47"
        stroke-width="1.5"
        stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Lens housing -->
  <circle cx="128" cy="128" r="120" fill="url(#ap-lens)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#5C4F47" stroke-width="3"/>
  <circle cx="128" cy="128" r="115" fill="none" stroke="#0a0807" stroke-width="1" opacity="0.7"/>

  <!-- 9 rotated blade regions -->
  <g>
    <use href="#ap-blade" transform="rotate(0 128 128)"/>
    <use href="#ap-blade" transform="rotate(40 128 128)"/>
    <use href="#ap-blade" transform="rotate(80 128 128)"/>
    <use href="#ap-blade" transform="rotate(120 128 128)"/>
    <use href="#ap-blade" transform="rotate(160 128 128)"/>
    <use href="#ap-blade" transform="rotate(200 128 128)"/>
    <use href="#ap-blade" transform="rotate(240 128 128)"/>
    <use href="#ap-blade" transform="rotate(280 128 128)"/>
    <use href="#ap-blade" transform="rotate(320 128 128)"/>
  </g>

  <!-- Central iris opening: amber sodium-vapor glow -->
  <circle cx="128" cy="128" r="40" fill="url(#ap-glow)"/>
  <circle cx="128" cy="128" r="20" fill="#FBBF24"/>
  <circle cx="128" cy="128" r="14" fill="#FEF3C7" opacity="0.6"/>
</svg>
