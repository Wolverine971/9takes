<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="9takes — decoder cipher wheel">
  <title>9takes — Decoder Cipher</title>
  <desc>Brass cipher wheel with nine fixed positions and a rotating dial. The amber wedge marks the active reading. The Enneagram as a system you operate.</desc>

  <defs>
    <!-- Outer brass ring — top-left highlight, bottom-right shadow -->
    <radialGradient id="cp-ring" cx="32%" cy="28%" r="85%">
      <stop offset="0%"  stop-color="#c9b393"/>
      <stop offset="20%" stop-color="#9a805f"/>
      <stop offset="55%" stop-color="#4a3d2f"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </radialGradient>

    <!-- Inner bronze dial -->
    <radialGradient id="cp-dial" cx="38%" cy="32%" r="72%">
      <stop offset="0%"  stop-color="#5a4a38"/>
      <stop offset="40%" stop-color="#3a302a"/>
      <stop offset="100%" stop-color="#16110d"/>
    </radialGradient>

    <!-- Recessed inner well between rings -->
    <radialGradient id="cp-well" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </radialGradient>

    <!-- Active wedge — luminous amber -->
    <linearGradient id="cp-wedge" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="#FEF3C7"/>
      <stop offset="20%" stop-color="#FBBF24"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>

    <!-- Brass center pivot -->
    <radialGradient id="cp-pivot" cx="40%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#FBBF24"/>
      <stop offset="50%" stop-color="#a89060"/>
      <stop offset="100%" stop-color="#3a302a"/>
    </radialGradient>

    <!-- Top-left rim glaze -->
    <radialGradient id="cp-glaze" cx="35%" cy="22%" r="55%">
      <stop offset="0%"  stop-color="#e8d8c0" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#e8d8c0" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#e8d8c0" stop-opacity="0"/>
    </radialGradient>

    <!-- Engraved tick: dark inset with light edge -->
    <symbol id="cp-tick" overflow="visible">
      <line x1="128" y1="32"  x2="128" y2="14" stroke="#0a0807" stroke-width="4"  stroke-linecap="round"/>
      <line x1="128" y1="32"  x2="128" y2="14" stroke="#d4c4b4" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="128" y1="32"  x2="128" y2="14" stroke="#FBBF24" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>
    </symbol>

    <!-- Engraved dial segment line -->
    <symbol id="cp-seg" overflow="visible">
      <line x1="135.5" y1="107.3" x2="154.7" y2="54.7" stroke="#0a0807" stroke-width="2.4" stroke-linecap="round"/>
      <line x1="135.5" y1="107.3" x2="154.7" y2="54.7" stroke="#7d6a5b" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
    </symbol>

    <!-- Type-number dot at outer ring (small brass stud near each tick) -->
    <symbol id="cp-stud" overflow="visible">
      <circle cx="128" cy="44" r="2.4" fill="#FBBF24"/>
      <circle cx="128" cy="44" r="1.2" fill="#FFFBEB"/>
    </symbol>

    <filter id="cp-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer brass ring -->
  <circle cx="128" cy="128" r="124" fill="url(#cp-ring)"/>
  <circle cx="128" cy="128" r="124" fill="none" stroke="#0a0807" stroke-width="2"/>
  <circle cx="128" cy="128" r="118" fill="none" stroke="#1a1410" stroke-width="1.5"/>

  <!-- Recessed well between outer ring and inner dial -->
  <circle cx="128" cy="128" r="106" fill="url(#cp-well)"/>
  <circle cx="128" cy="128" r="106" fill="none" stroke="#3a302a" stroke-width="1"/>

  <!-- 9 engraved ticks at 0°, 40°, 80°, … on outer ring -->
  <g>
    <use href="#cp-tick" transform="rotate(0 128 128)"/>
    <use href="#cp-tick" transform="rotate(40 128 128)"/>
    <use href="#cp-tick" transform="rotate(80 128 128)"/>
    <use href="#cp-tick" transform="rotate(120 128 128)"/>
    <use href="#cp-tick" transform="rotate(160 128 128)"/>
    <use href="#cp-tick" transform="rotate(200 128 128)"/>
    <use href="#cp-tick" transform="rotate(240 128 128)"/>
    <use href="#cp-tick" transform="rotate(280 128 128)"/>
    <use href="#cp-tick" transform="rotate(320 128 128)"/>
  </g>

  <!-- Brass studs between ticks (small accent dots, type indicators) -->
  <g opacity="0.85">
    <use href="#cp-stud" transform="rotate(0 128 128)"/>
    <use href="#cp-stud" transform="rotate(40 128 128)"/>
    <use href="#cp-stud" transform="rotate(80 128 128)"/>
    <use href="#cp-stud" transform="rotate(120 128 128)"/>
    <use href="#cp-stud" transform="rotate(160 128 128)"/>
    <use href="#cp-stud" transform="rotate(200 128 128)"/>
    <use href="#cp-stud" transform="rotate(240 128 128)"/>
    <use href="#cp-stud" transform="rotate(280 128 128)"/>
    <use href="#cp-stud" transform="rotate(320 128 128)"/>
  </g>

  <!-- Inner bronze dial -->
  <circle cx="128" cy="128" r="86" fill="url(#cp-dial)"/>
  <circle cx="128" cy="128" r="86" fill="none" stroke="#0a0807" stroke-width="1.5"/>
  <circle cx="128" cy="128" r="82" fill="none" stroke="#7d6a5b" stroke-width="0.6" opacity="0.55"/>

  <!-- Active wedge — between -20° and +20° on dial -->
  <g filter="url(#cp-bloom)">
    <path
      d="M 128,128 L 101.3,54.7 A 78,78 0 0,1 154.7,54.7 Z"
      fill="url(#cp-wedge)"/>
  </g>
  <!-- Inner edge highlight on the wedge -->
  <path
    d="M 101.3,54.7 A 78,78 0 0,1 154.7,54.7"
    fill="none"
    stroke="#FEF3C7"
    stroke-width="1.8"
    stroke-linecap="round"
    opacity="0.85"/>

  <!-- 9 dial segment lines at θ=20°, 60°, … -->
  <g>
    <use href="#cp-seg" transform="rotate(0 128 128)"/>
    <use href="#cp-seg" transform="rotate(40 128 128)"/>
    <use href="#cp-seg" transform="rotate(80 128 128)"/>
    <use href="#cp-seg" transform="rotate(120 128 128)"/>
    <use href="#cp-seg" transform="rotate(160 128 128)"/>
    <use href="#cp-seg" transform="rotate(200 128 128)"/>
    <use href="#cp-seg" transform="rotate(240 128 128)"/>
    <use href="#cp-seg" transform="rotate(280 128 128)"/>
    <use href="#cp-seg" transform="rotate(320 128 128)"/>
  </g>

  <!-- Inner hub bezel -->
  <circle cx="128" cy="128" r="26" fill="#241D17" stroke="#0a0807" stroke-width="1.5"/>
  <circle cx="128" cy="128" r="22" fill="none" stroke="#7d6a5b" stroke-width="0.8" opacity="0.6"/>

  <!-- Pointer triangle pointing up at active wedge -->
  <path d="M 128,104 L 119,124 L 137,124 Z" fill="#FBBF24" stroke="#7c2d12" stroke-width="1" stroke-linejoin="round"/>
  <path d="M 128,104 L 122,123" stroke="#FEF9C3" stroke-width="1" stroke-linecap="round" opacity="0.9"/>

  <!-- Brass center pivot -->
  <circle cx="128" cy="128" r="6" fill="url(#cp-pivot)" stroke="#0a0807" stroke-width="0.8"/>
  <circle cx="126" cy="126" r="2" fill="#FFFBEB" opacity="0.85"/>

  <!-- Top-left glaze on outer ring -->
  <circle cx="128" cy="128" r="124" fill="url(#cp-glaze)" pointer-events="none"/>
</svg>
