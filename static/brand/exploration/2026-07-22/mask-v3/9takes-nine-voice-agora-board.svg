<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">9takes Nine-Voice Agora logo concept board</title>
  <desc id="desc">A monochrome logo made from nine equal inward-facing profile seats around an open commons, shown as a primary mark, inverse app icon, and at small sizes.</desc>
  <defs>
    <path id="voice" d="M 416 187 Q 512 150 608 187 L 596 232 L 576 272 L 560 285 L 552 300 L 548 315 L 560 332 L 544 329 L 548 339 L 536 335 L 532 346 C 510 343 495 334 482 320 L 460 300 L 448 272 L 428 232 Z"/>
    <symbol id="agora" viewBox="0 0 1024 1024">
      <g fill="currentColor">
        <use href="#voice" transform="rotate(0 512 512)"/>
        <use href="#voice" transform="rotate(40 512 512)"/>
        <use href="#voice" transform="rotate(80 512 512)"/>
        <use href="#voice" transform="rotate(120 512 512)"/>
        <use href="#voice" transform="rotate(160 512 512)"/>
        <use href="#voice" transform="rotate(200 512 512)"/>
        <use href="#voice" transform="rotate(240 512 512)"/>
        <use href="#voice" transform="rotate(280 512 512)"/>
        <use href="#voice" transform="rotate(320 512 512)"/>
      </g>
    </symbol>
  </defs>

  <rect width="1600" height="1000" fill="#f4f1ea"/>

  <g fill="#151515" font-family="Inter, Helvetica, Arial, sans-serif">
    <text x="96" y="102" font-size="54" font-weight="750" letter-spacing="-1.5">NINE-VOICE AGORA</text>
    <text x="99" y="148" font-size="22" font-weight="500" letter-spacing="0.2">Nine equal perspectives. One open commons.</text>
  </g>

  <g style="color:#151515">
    <use href="#agora" x="60" y="175" width="650" height="650"/>
  </g>

  <g>
    <rect x="835" y="185" width="560" height="560" rx="126" fill="#151515"/>
    <g style="color:#f4f1ea">
      <use href="#agora" x="875" y="225" width="480" height="480"/>
    </g>
  </g>

  <g fill="#151515" font-family="Inter, Helvetica, Arial, sans-serif">
    <text x="98" y="895" font-size="18" font-weight="700" letter-spacing="1.8">CONSTRUCTION</text>
    <text x="98" y="930" font-size="18">9 equal units · 40° intervals · 1 shared center</text>
    <text x="836" y="805" font-size="18" font-weight="700" letter-spacing="1.8">APP ICON TEST</text>
  </g>

  <g style="color:#151515">
    <use href="#agora" x="1180" y="800" width="128" height="128"/>
    <use href="#agora" x="1330" y="832" width="64" height="64"/>
    <use href="#agora" x="1422" y="848" width="32" height="32"/>
  </g>
  <g fill="#66615a" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" text-anchor="middle">
    <text x="1244" y="955">128</text>
    <text x="1362" y="925">64</text>
    <text x="1438" y="905">32</text>
  </g>
</svg>
